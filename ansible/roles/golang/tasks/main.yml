---
# This role manages the Go application deployment using Docker Compose.
# Supervisor and related tasks have been removed and replaced with Docker commands.

# 1. PREREQUISITES: Ensure Docker and Docker Compose are installed and running.
#    This section assumes Docker is installed. If not, you would need to add tasks
#    to install it (e.g., using apt for Debian/Ubuntu).

- name: Ensure Docker is installed
  ansible.builtin.package:
    name: docker.io
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == 'Debian' # Example for Debian-based systems

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
  become: yes

# Install Docker Compose using pip. Requires python3-pip to be installed.
# Adjust this task if you have a different method for installing Docker Compose.
- name: Ensure Python pip is installed
  ansible.builtin.package:
    name: python3-pip
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == 'Debian'

- name: Install Docker Compose via pip
  ansible.builtin.pip:
    name: docker-compose
    state: present
  become: yes

# 2. APPLICATION SETUP: Prepare the application directory and its configuration files.

- name: Ensure application directory exists and has correct ownership
  ansible.builtin.file:
    path: "{{ app_path }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: yes
  become: yes


- name: Ensure .env file exists with necessary variables for Docker
  ansible.builtin.blockinfile:
    path: "{{ app_path }}/.env"
    block: |
      # Environment variables for Docker container
      # APP_PORT should match the port exposed in the Dockerfile (e.g., 8080)
      # and the internal port in docker-compose.yml (e.g., 3000:3000 maps host:container)
      APP_PORT={{ app_port | default('3000') }}
      APP_ENV={{ app_env | default('production') }}
      # Add other necessary environment variables here, e.g., database credentials
      # DB_HOST=db
      # DB_PORT=5432
      # DB_USER=your_db_user
      # DB_PASSWORD=your_db_password
      # DB_NAME=your_db_name
    create: yes # Create .env if it doesn't exist
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0644'
  become: yes

# 3. DOCKER DEPLOYMENT: Build and run the application using Docker Compose.

- name: Ensure common application data directories exist (e.g., storage/logs)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0775"
  loop:
    - "{{ app_path }}/storage/logs" # Common log directory for Go apps
  become: yes

- name: Build Docker image for the Go application using docker-compose
  community.docker.docker_compose:
    project_src: "{{ app_path }}" # Path to the directory containing docker-compose.yml
    build: true # Triggers 'docker-compose build'
  become: yes
  register: docker_compose_build
  changed_when: "'built' in docker_compose_build.stdout"

- name: Start the Go application container using Docker Compose
  community.docker.docker_compose:
    project_src: "{{ app_path }}" # Path to the directory containing docker-compose.yml
    state: present # Equivalent to 'docker-compose up -d'
    restarted: yes # Ensures container is running and restarts if it stopped
  become: yes
  register: docker_compose_up
  changed_when: "'created' in docker_compose_up.stdout or 'recreated' in docker_compose_up.stdout or 'started' in docker_compose_up.stdout"

# Optional: Add tasks to stop/remove containers if needed for updates or uninstallation.
