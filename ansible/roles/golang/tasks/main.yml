---
# 1. PRE-CHECK: Cek apakah config supervisor dengan nama ini sudah ada
- name: Pre-check | Check if supervisor config exists
  stat:
    path: "/etc/supervisor/conf.d/{{ app_name }}.conf"
  register: supervisor_conf

# 2. VALIDASI PORT (Hanya jalan jika project BELUM PERNAH diinstall/app_name baru)
- name: Validation | Check port if this is a NEW project
  wait_for:
    port: "{{ app_port }}"
    state: stopped
    timeout: 2
  ignore_errors: yes
  register: port_status
  when: not supervisor_conf.stat.exists

- name: Validation | Fail if port is used by ANOTHER project
  fail:
    msg: "Port {{ app_port }} sudah dipakai project lain. Ganti port-nya dulu!"
  when:
    - not supervisor_conf.stat.exists
    - port_status is failed

# 3. MAINTENANCE: Stop service (kalau project sudah ada)
- name: Maintenance | Stop existing Go service
  shell: "supervisorctl stop {{ app_name }}:* || supervisorctl stop {{ app_name }} || true"
  become: yes
  when: supervisor_conf.stat.exists

- name: Setup | Ensure directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0775"
  loop:
    - "{{ app_path }}"
    - "{{ app_path }}/storage/logs"

# 2. MAINTENANCE
- name: Maintenance | Stop existing Go service
  shell: "supervisorctl stop {{ app_name }}:* || supervisorctl stop {{ app_name }} || true"
  become: yes
  when: supervisor_conf.stat.exists
  register: stop_result
  changed_when: "'stopped' in stop_result.stdout"

# 2. CONFIGURATION UPDATE
- name: Config | Update APP_PORT in .env file
  lineinfile:
    path: "{{ app_path }}/.env"
    regexp: "^APP_PORT="
    line: "APP_PORT={{ app_port }}"
    create: yes # Buat file .env kalau belum ada
  become: yes
  become_user: "{{ app_user }}"

- name: Config | Update APP_ENV in .env file
  lineinfile:
    path: "{{ app_path }}/.env"
    regexp: "^APP_ENV="
    line: "APP_ENV=local" # Atau sesuaikan dengan env lo
  become: yes
  become_user: "{{ app_user }}"

# 3. BUILD PROCESS
- name: Build | Compile Go Binary (Artisan Style)
  command: "/usr/bin/go build -buildvcs=false -o artisan ./cmd/artisan"
  args:
    chdir: "{{ app_path }}"
  become: yes
  become_user: "{{ app_user }}"

# 4. PERMISSIONS & OWNERSHIP (TASK BARU)
- name: Permissions | Ensure app_user owns the project directory
  file:
    path: "{{ app_path }}"
    state: directory
    recurse: yes
    owner: "{{ app_user }}"
    group: "{{ app_group }}"

- name: Permissions | Make artisan binary executable
  file:
    path: "{{ app_path }}/artisan"
    mode: "0755"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"

# 5. DEPLOY CONFIG & RELOAD
- name: Deploy | Supervisor configuration
  template:
    src: go_app.conf.j2
    dest: "/etc/supervisor/conf.d/{{ app_name }}.conf"
  become: yes

- name: Supervisor | Force Reread and Update
  shell: "supervisorctl reread && supervisorctl update"
  become: yes
  changed_when: false

# 6. FINALIZE (START/RESTART)
- name: Finalize | Start/Restart Go Service
  shell: "supervisorctl restart {{ app_name }}:* || supervisorctl restart {{ app_name }} || supervisorctl start {{ app_name }}"
  become: yes
  register: go_start_result
  failed_when:
    - go_start_result.rc != 0
    - "'already started' not in go_start_result.stdout"
  changed_when: "'started' in go_start_result.stdout or 'restarted' in go_start_result.stdout"
