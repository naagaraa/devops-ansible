---
# This role manages the Laravel Octane application deployment using Docker Compose.
# Supervisor and related tasks have been removed and replaced with Docker commands.

# 1. PREREQUISITES: Ensure Docker and Docker Compose are installed and running.
#    This section assumes Docker is installed. If not, you would need to add tasks
#    to install it (e.g., using apt for Debian/Ubuntu).

- name: Ensure Docker is installed
  ansible.builtin.package:
    name: docker.io
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == 'Debian' # Example for Debian-based systems

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
  become: yes

# Install Docker Compose using pip. Requires python3-pip to be installed.
# Adjust this task if you have a different method for installing Docker Compose.
- name: Ensure Python pip is installed
  ansible.builtin.package:
    name: python3-pip
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == 'Debian'

- name: Install Docker Compose via pip
  ansible.builtin.pip:
    name: docker-compose
    state: present
  become: yes

# 2. APPLICATION SETUP: Prepare the application directory and its configuration files.

- name: Ensure application directory exists and has correct ownership
  ansible.builtin.file:
    path: "{{ app_path }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: yes
  become: yes


- name: Ensure .env file exists with necessary variables for Laravel Octane Docker
  ansible.builtin.blockinfile:
    path: "{{ app_path }}/.env"
    block: |
      # Environment variables for Laravel Octane Docker container
      APP_NAME={{ app_name | default('Laravel Octane App') }}
      APP_ENV={{ app_env | default('production') }}
      APP_DEBUG=false
      APP_URL=http://localhost:8000 # Or your server's domain/IP

      # Add any other application-specific environment variables here
      # Example for an external database:
      # DB_HOST=your_external_db_host
      # DB_PORT=5432
      # DB_DATABASE=your_db_name
      # DB_USERNAME=your_db_user
      # DB_PASSWORD=your_db_password
    create: yes # Create .env if it doesn't exist
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0644'
  become: yes

# 4. LARAVEL DEPENDENCY INSTALLATION & CACHE (ensure these are run in build or handled by composer install in Dockerfile)
# The Dockerfile is configured to run composer install and artisan optimize.

# 5. DOCKER DEPLOYMENT: Build and run the application using Docker Compose.

- name: Ensure common application data directories exist (e.g., storage/logs)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0775"
  loop:
    - "{{ app_path }}/storage/logs" # Common log directory
    - "{{ app_path }}/bootstrap/cache" # Cache directory
  become: yes

- name: Build Docker image for the Laravel Octane application using docker-compose
  community.docker.docker_compose:
    project_src: "{{ app_path }}" # Path to the directory containing docker-compose.yml
    build: true # Triggers 'docker-compose build'
  become: yes
  register: docker_compose_build
  changed_when: "'built' in docker_compose_build.stdout"

- name: Start the Laravel Octane application container using Docker Compose
  community.docker.docker_compose:
    project_src: "{{ app_path }}" # Path to the directory containing docker-compose.yml
    state: present # Equivalent to 'docker-compose up -d'
    restarted: yes # Ensures container is running and restarts if it stopped
  become: yes
  register: docker_compose_up
  changed_when: "'created' in docker_compose_up.stdout or 'recreated' in docker_compose_up.stdout or 'started' in docker_compose_up.stdout"

# Optional: Task to run database migrations after the containers are up and healthy.
# This is a common step for initial deployments or significant schema changes.
- name: Run Laravel database migrations
  community.docker.docker_compose:
    project_src: "{{ app_path }}"
    command: php artisan migrate --force # Use --force for production to avoid interactive prompt
    # You can specify which service to run the command on if you have multiple services
    # service: laravel_octane
  become: yes
  when: migrate_database | default(true) # Set migrate_database to false in vars to skip

