---
# =========================
# INSTALL POSTGRESQL
# =========================
- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - postgresql-client
    state: present
    update_cache: yes

- name: Ensure PostgreSQL running
  service:
    name: postgresql
    state: started
    enabled: yes

# =========================
# CONFIGURE PG_HBA.CONF
# =========================
- name: Configure pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: "0640"
  when: postgresql_pg_hba_enabled | bool
  notify: restart postgresql

- name: Ensure PostgreSQL listens on all interfaces
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
    regexp: '^#?listen_addresses\s*='
    line: "listen_addresses = '*'"
    state: present
  notify: restart postgresql

- name: Allow PostgreSQL port for remote IP
  ufw:
    rule: allow
    port: 5432
    proto: tcp
    from_ip: "{{ postgresql_remote }}"
# =========================
# Reload Posgresql
# =========================
- name: Reload PostgreSQL
  service:
    name: postgresql
    state: reloaded
  when: postgresql_pg_hba_enabled | bool

# =========================
# CREATE DATABASES
# =========================
- name: Create databases
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ item.name }}'" | grep -q 1 || \
    sudo -u postgres createdb {{ item.name }}
  loop: "{{ postgresql_databases }}"

# =========================
# CREATE USERS
# =========================
- name: Create admin user
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ item.name }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE USER {{ item.name }} WITH PASSWORD '{{ item.password }}' CREATEDB CREATEROLE;"
  loop: "{{ postgresql_users }}"
  when: item.role == 'admin'

- name: Create developer user
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ item.name }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE USER {{ item.name }} WITH PASSWORD '{{ item.password }}';"
  loop: "{{ postgresql_users }}"
  when: item.role == 'developer'

- name: Create backup user
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ item.name }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE USER {{ item.name }} WITH PASSWORD '{{ item.password }}';"
  loop: "{{ postgresql_users }}"
  when: item.role == 'backup'

# =========================
# GRANT PRIVILEGES
# =========================
- name: Grant admin privileges
  shell: |
    sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ item.db }} TO {{ item.roles }};"
  loop: "{{ postgresql_grants }}"
  when: item.roles == 'db_admin'

- name: Grant developer privileges
  shell: |
    sudo -u postgres psql -d {{ item.db }} -c "
      GRANT CONNECT ON DATABASE {{ item.db }} TO {{ item.roles }};
      GRANT USAGE ON SCHEMA public TO {{ item.roles }};
      GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO {{ item.roles }};
      GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO {{ item.roles }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO {{ item.roles }};
    "
  loop: "{{ postgresql_grants }}"
  when: item.roles == 'db_developer'

- name: Grant backup privileges
  shell: |
    sudo -u postgres psql -d {{ item.db }} -c "
      GRANT CONNECT ON DATABASE {{ item.db }} TO {{ item.roles }};
      GRANT USAGE ON SCHEMA public TO {{ item.roles }};
      GRANT SELECT ON ALL TABLES IN SCHEMA public TO {{ item.roles }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO {{ item.roles }};
    "
  loop: "{{ postgresql_grants }}"
  when: item.roles == 'db_backup'

# =========================
# BACKUP SETUP
# =========================
- name: Create backup directory
  file:
    path: "{{ postgresql_backup_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"
  when: postgresql_backup_enabled | bool

- name: Create backup script
  copy:
    dest: /usr/local/bin/pg_backup.sh
    owner: postgres
    group: postgres
    mode: "0750"
    content: |
      #!/bin/bash
      # =========================
      # PostgreSQL Backup Script
      # =========================
      DATE=$(date +%Y%m%d_%H%M%S)
      BACKUP_DIR="{{ postgresql_backup_dir }}"
      RETENTION_DAYS="{{ postgresql_backup_retention_days }}"

      echo "Starting backup at $DATE"

      # Backup each database
      {% for db in postgresql_databases %}
      echo "Backing up {{ db.name }}..."
      sudo -u postgres pg_dump {{ db.name }} | gzip > $BACKUP_DIR/{{ db.name }}_$DATE.sql.gz

      if [ $? -eq 0 ]; then
        echo "✅ {{ db.name }} backup SUCCESS"
      else
        echo "❌ {{ db.name }} backup FAILED"
        exit 1
      fi
      {% endfor %}

      # Remove old backups
      echo "Removing backups older than $RETENTION_DAYS days..."
      find $BACKUP_DIR -name "*.sql.gz" -mtime +$RETENTION_DAYS -delete

      echo "Backup completed at $(date +%Y%m%d_%H%M%S)"
  when: postgresql_backup_enabled | bool

- name: Schedule backup cron job
  cron:
    name: "PostgreSQL backup"
    user: postgres
    job: "/usr/local/bin/pg_backup.sh >> /var/log/pg_backup.log 2>&1"
    minute: "0"
    hour: "2"
    state: present
  when: postgresql_backup_enabled | bool

# =========================
# RECOVERY SCRIPT
# =========================
- name: Create recovery script
  copy:
    dest: /usr/local/bin/pg_recovery.sh
    owner: postgres
    group: postgres
    mode: "0750"
    content: |
      #!/bin/bash
      # =========================
      # PostgreSQL Recovery Script
      # =========================
      BACKUP_DIR="{{ postgresql_backup_dir }}"

      echo "Available backups:"
      echo "=================="
      ls -lh $BACKUP_DIR/*.sql.gz 2>/dev/null || echo "No backups found!"
      echo ""

      # Check if backup file passed as argument
      if [ -z "$1" ]; then
        echo "Usage: pg_recovery.sh <backup_file> <database_name>"
        echo "Example: pg_recovery.sh appspace_db_20240101_020000.sql.gz appspace_db"
        exit 1
      fi

      BACKUP_FILE="$1"
      DB_NAME="$2"

      echo "⚠️  WARNING: This will RESTORE $DB_NAME from $BACKUP_FILE"
      read -p "Are you sure? (yes/no): " CONFIRM

      if [ "$CONFIRM" != "yes" ]; then
        echo "Recovery cancelled"
        exit 0
      fi

      echo "Starting recovery..."

      # Drop and recreate database
      sudo -u postgres psql -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='$DB_NAME';"
      sudo -u postgres psql -c "DROP DATABASE IF EXISTS $DB_NAME;"
      sudo -u postgres psql -c "CREATE DATABASE $DB_NAME;"

      # Restore from backup
      gunzip -c $BACKUP_DIR/$BACKUP_FILE | sudo -u postgres psql $DB_NAME

      if [ $? -eq 0 ]; then
        echo "✅ Recovery SUCCESS — $DB_NAME restored from $BACKUP_FILE"
      else
        echo "❌ Recovery FAILED"
        exit 1
      fi
  when: postgresql_backup_enabled | bool

# =========================
# INSTALL DEPENDENCIES
# =========================
- name: Install dependencies
  apt:
    name:
      - nginx
      - php
      - php-fpm
      - php-pgsql
      - wget
      - php-mbstring
      - php-xml
      - php-curl
      - php-zip
    state: present
    update_cache: yes

# =========================
# GET PHP VERSION
# =========================
- name: Get PHP version
  shell: php -r "echo PHP_MAJOR_VERSION.'.'.PHP_MINOR_VERSION;"
  register: php_version
  changed_when: false

# =========================
# ENSURE SERVICES RUNNING
# =========================
- name: Ensure Nginx running
  service:
    name: nginx
    state: started
    enabled: yes

- name: Ensure PHP-FPM running
  service:
    name: php{{ php_version.stdout }}-fpm
    state: started
    enabled: yes

# =========================
# INSTALL ADMINER
# =========================
- name: Create Adminer directory
  file:
    path: /var/www/adminer
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Download Adminer
  get_url:
    url: https://www.adminer.org/latest.php
    dest: /var/www/adminer/index.php
    owner: www-data
    group: www-data
    mode: "0644"

# =========================
# NGINX CONFIG
# =========================
- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Configure Nginx for Adminer
  copy:
    dest: /etc/nginx/sites-available/adminer.conf
    content: |
      server {
          listen 80;
          server_name _;
          root /var/www/adminer;
          index index.php;

          location / {
              try_files $uri $uri/ /index.php?$query_string;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:/run/php/php{{ php_version.stdout }}-fpm.sock;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              include fastcgi_params;
          }

          location ~ /\.ht {
              deny all;
          }
      }

- name: Enable Adminer site
  file:
    src: /etc/nginx/sites-available/adminer.conf
    dest: /etc/nginx/sites-enabled/adminer.conf
    state: link

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false

- name: Restart Nginx
  service:
    name: nginx
    state: restarted

- name: Restart PHP-FPM
  service:
    name: php{{ php_version.stdout }}-fpm
    state: restarted

# =========================
# MOTD SETUP
# =========================
- name: Find existing default MOTD scripts
  find:
    paths: /etc/update-motd.d/
    patterns: "*"
    excludes: "99-postgresql" # ← skip our custom MOTD
  register: existing_motd_files

- name: Disable existing default MOTD scripts
  file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ existing_motd_files.files }}"

- name: Create custom MOTD script
  copy:
    dest: /etc/update-motd.d/99-postgresql
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      # =========================
      # PostgreSQL MOTD
      # =========================
      BACKUP_DIR="{{ postgresql_backup_dir }}"

      echo ""
      echo "╔══════════════════════════════════════════════════════╗"
      echo "║           🐘 PostgreSQL Database Server              ║"
      echo "╚══════════════════════════════════════════════════════╝"
      echo ""

      # PostgreSQL Status
      echo "📊 DATABASE STATUS"
      echo "──────────────────────────────────────────────────────"
      PG_STATUS=$(systemctl is-active postgresql)
      if [ "$PG_STATUS" = "active" ]; then
        echo "  PostgreSQL   : ✅ Running"
      else
        echo "  PostgreSQL   : ❌ Stopped"
      fi

      # Show databases
      echo ""
      echo "  Databases:"
      sudo -u postgres psql -tc "SELECT '  → ' || datname FROM pg_database WHERE datname NOT IN ('template0','template1','postgres');" 2>/dev/null

      # Show users
      echo ""
      echo "  Users:"
      sudo -u postgres psql -tc "SELECT '  → ' || rolname || ' (' || CASE WHEN rolsuper THEN 'admin' WHEN rolcreatedb THEN 'createdb' ELSE 'normal' END || ')' FROM pg_roles WHERE rolname NOT LIKE 'pg_%';" 2>/dev/null

      # Backup Status
      echo ""
      echo "💾 BACKUP STATUS"
      echo "──────────────────────────────────────────────────────"
      if [ -d "$BACKUP_DIR" ]; then
        LATEST=$(ls -t $BACKUP_DIR/*.sql.gz 2>/dev/null | head -1)
        COUNT=$(ls $BACKUP_DIR/*.sql.gz 2>/dev/null | wc -l)
        if [ -n "$LATEST" ]; then
          LATEST_DATE=$(stat -c %y "$LATEST" | cut -d' ' -f1,2 | cut -d'.' -f1)
          LATEST_SIZE=$(du -sh "$LATEST" | cut -f1)
          echo "  Latest Backup : $LATEST_DATE"
          echo "  Backup Size   : $LATEST_SIZE"
          echo "  Total Backups : $COUNT file(s)"
        else
          echo "  ⚠️  No backups found!"
        fi
      else
        echo "  ⚠️  Backup directory not found!"
      fi

      # Next backup schedule
      echo ""
      NEXT_BACKUP=$(sudo -u postgres crontab -l 2>/dev/null | grep pg_backup | awk '{print "Every day at "$2":00"}')
      echo "  Next Schedule : ${NEXT_BACKUP:-Not scheduled}"

      # Quick Commands
      echo ""
      echo "🛠️  QUICK COMMANDS"
      echo "──────────────────────────────────────────────────────"
      echo "  List backups  : sudo /usr/local/bin/pg_recovery.sh"
      echo "  Restore DB    : sudo /usr/local/bin/pg_recovery.sh <backup_file> <db_name>"
      echo "  Manual backup : sudo /usr/local/bin/pg_backup.sh"
      echo "  Connect DB    : sudo -u postgres psql"
      echo "  Adminer UI    : http://$(hostname -I | awk '{print $1}')/"
      echo ""
      echo "📋 BACKUP LOG   : tail -f /var/log/pg_backup.log"
      echo "──────────────────────────────────────────────────────"
      echo ""
