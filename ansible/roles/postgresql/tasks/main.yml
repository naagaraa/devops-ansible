---
- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present

- name: Ensure PostgreSQL is started
  systemd:
    name: postgresql
    enabled: yes
    state: started

- name: Wait for PostgreSQL to be ready
  wait_for:
    port: "{{ postgresql_port }}"
    delay: 2
    timeout: 30

- name: Create databases
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ item.name }}"
    encoding: "{{ item.encoding | default('UTF8') }}"
    lc_collate: "{{ item.lc_collate | default('en_US.UTF-8') }}"
    lc_ctype: "{{ item.lc_ctype | default('en_US.UTF-8') }}"
    template: "{{ item.template | default('template0') }}"
    state: present
  loop: "{{ postgresql_databases }}"
  when: postgresql_databases | length > 0

- name: Create users
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password | default(omit) }}"
    encrypted: "{{ item.encrypted | default(true) }}"
    priv: "{{ item.priv | default(omit) }}"
    state: present
  loop: "{{ postgresql_users }}"
  when: postgresql_users | length > 0

- name: Grant privileges
  become: yes
  become_user: postgres
  postgresql_privs:
    type: database
    database: "{{ item.db }}"
    roles: "{{ item.roles }}"
    privs: "{{ item.privs }}"
    state: present
  loop: "{{ postgresql_grants }}"
  when: postgresql_grants is defined and postgresql_grants | length > 0

- name: Configure pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: '0640'
  notify: Restart PostgreSQL
  when: postgresql_pg_hba_enabled | bool

- name: Configure postgresql.conf - listen addresses
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL

- name: Configure postgresql.conf - port
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
    regexp: "^#?port"
    line: "port = {{ postgresql_port }}"
  notify: Restart PostgreSQL

- name: Allow password authentication from remote
  postgresql_pg_hba:
    dest: /etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf
    contype: host
    database: all
    user: all
    address: '0.0.0.0/0'
    method: md5
    create: true
    state: present
  when: not postgresql_pg_hba_enabled | bool

- name: Allow password authentication from IPv6
  postgresql_pg_hba:
    dest: /etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf
    contype: host
    database: all
    user: all
    address: '::0/0'
    method: md5
    create: true
    state: present
  when: not postgresql_pg_hba_enabled | bool

- name: Setup complete
  debug:
    msg: "✅ PostgreSQL ready on port {{ postgresql_port }}"
