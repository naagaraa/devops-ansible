- name: Apply base app server configuration
  hosts: webservers
  become: yes
  vars:
    app_user: app-space
    nvm_version: v0.39.7
  tags: [base-server]
  roles:
    - role: base-server
      tags: [base-server]

- name: Setup Laravel + Go + Nginx
  hosts: webservers
  become: yes
  tags: [laravel-go]
  roles:
    - role: laravel-go
      tags: [laravel-go]

- name: Setup PostgreSQL Database
  hosts: app-db
  become: yes
  vars:
    app_user: app-db
  tags: [postgresql]
  roles:
    - role: postgresql
      tags: [postgresql]

- name: Final message
  hosts: localhost
  gather_facts: false
  tags: [never]
  tasks:
    - name: Final setup message
      ansible.builtin.debug:
        msg: "All setups completed successfully!"
