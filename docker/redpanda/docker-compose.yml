services:
  redpanda:
    image: redpandadata/redpanda:v23.3.18
    container_name: redpanda
    restart: unless-stopped

    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://127.0.0.1:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://127.0.0.1:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145

    ports:
      - "127.0.0.1:19092:19092"
      - "127.0.0.1:18082:18082"
      - "127.0.0.1:18081:18081"
      - "127.0.0.1:9644:9644"

    volumes:
      - /home/developer/docker/redpanda/data:/var/lib/redpanda/data

    networks:
      - devops

  console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped

    depends_on:
      - redpanda

    ports:
      - "127.0.0.1:8080:8080"

    environment:
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMIN_API: http://redpanda:9644
      SCHEMA_REGISTRY_ENABLED: "true"
      REDPANDA_SCHEMA_REGISTRY: http://redpanda:8081

    networks:
      - devops

networks:
  devops:
    external: true
